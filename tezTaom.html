<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TezTaom - Fast Food Buyurtma</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #fff8f0; }

    .header {
      background: #e8340a;
      color: white;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: #FFD600; }
    .cart-btn {
      background: #FFD600;
      color: #1a1a1a;
      border: none;
      border-radius: 24px;
      padding: 8px 18px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.15s;
    }
    .cart-btn:hover { transform: scale(1.05); }
    .cart-count {
      background: #e8340a;
      color: white;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    .promo-bar {
      background: #FFD600;
      color: #1a1a1a;
      text-align: center;
      padding: 6px;
      font-size: 12px;
      font-weight: 600;
    }

    .hero {
      background: linear-gradient(135deg, #e8340a 0%, #c0280a 100%);
      color: white;
      padding: 2rem 1.5rem;
      text-align: center;
    }
    .hero h1 { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
    .hero p { font-size: 14px; opacity: 0.85; }
    .delivery-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      margin-top: 10px;
    }

    .categories {
      display: flex;
      gap: 8px;
      padding: 1rem 1.5rem 0.5rem;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .categories::-webkit-scrollbar { display: none; }
    .cat-btn {
      background: white;
      border: 2px solid #eee;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      color: #555;
    }
    .cat-btn.active {
      background: #e8340a;
      border-color: #e8340a;
      color: white;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
      padding: 1rem 1.5rem 0.5rem;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      padding: 0 1rem 1rem;
    }

    .menu-card {
      background: white;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .menu-card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.12); }
    .menu-img {
      width: 100%;
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      background: #fff3ee;
    }
    .menu-info { padding: 10px; }
    .menu-name { font-size: 13px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; line-height: 1.3; }
    .menu-price { font-size: 14px; font-weight: 700; color: #e8340a; }
    .add-btn {
      width: 100%;
      margin-top: 8px;
      background: #e8340a;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .add-btn:hover { background: #c0280a; }
    .add-btn.added { background: #28a745; }

    .cart-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      align-items: flex-end;
    }
    .cart-overlay.open { display: flex; }
    .cart-panel {
      background: white;
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 1.5rem;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .cart-title { font-size: 18px; font-weight: 700; }
    .close-btn {
      background: #f5f5f5;
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cart-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .cart-item-emoji { font-size: 28px; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 14px; font-weight: 600; }
    .cart-item-price { font-size: 13px; color: #e8340a; font-weight: 600; }
    .qty-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .qty-btn {
      background: #f5f5f5;
      border: none;
      border-radius: 6px;
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    .qty-btn:hover { background: #e8340a; color: white; }
    .qty-num { font-size: 14px; font-weight: 700; min-width: 20px; text-align: center; }

    .cart-footer { margin-top: 1rem; }
    .total-row {
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 1rem;
      padding: 10px 0;
      border-top: 2px solid #f0f0f0;
    }
    .order-btn {
      width: 100%;
      background: #e8340a;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .order-btn:hover { background: #c0280a; }

    .address-section {
      background: #fff8f0;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 14px;
      border: 1.5px solid #ffe0cc;
    }
    .address-label { font-size: 12px; color: #888; margin-bottom: 6px; font-weight: 500; }
    .address-input {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .address-input:focus { border-color: #e8340a; }

    .empty-cart { text-align: center; padding: 2rem; color: #999; font-size: 14px; }

    .success-msg {
      display: none;
      text-align: center;
      padding: 2rem;
    }
    .success-msg.show { display: block; }
    .success-icon { font-size: 56px; margin-bottom: 12px; }
    .success-title { font-size: 20px; font-weight: 700; color: #28a745; margin-bottom: 8px; }
    .success-sub { font-size: 14px; color: #666; }
  </style>
</head>
<body>

<div class="promo-bar">Bugun birinchi buyurtmaga 20% chegirma! Kod: YANGI20</div>

<div class="header">
  <div class="logo">Tez<span>Taom</span></div>
  <button class="cart-btn" onclick="openCart()">
    🛒 Savat
    <div class="cart-count" id="cartCount">0</div>
  </button>
</div>

<div class="hero">
  <div class="delivery-badge">📍 Yetkazib berish: 30-45 daqiqa</div>
  <h1>Tez va mazali taomlar! 🔥</h1>
  <p>Uydan chiqmasdan buyurtma bering</p>
</div>

<div class="categories">
  <button class="cat-btn active" onclick="filterCat('all',this)">Barchasi</button>
  <button class="cat-btn" onclick="filterCat('burger',this)">🍔 Burgerlar</button>
  <button class="cat-btn" onclick="filterCat('pizza',this)">🍕 Pizza</button>
  <button class="cat-btn" onclick="filterCat('chicken',this)">🍗 Tovuq</button>
  <button class="cat-btn" onclick="filterCat('sides',this)">🍟 Qo'shimcha</button>
  <button class="cat-btn" onclick="filterCat('drinks',this)">🥤 Ichimliklar</button>
</div>

<div class="section-title">Mashhur taomlar</div>
<div class="menu-grid" id="menuGrid"></div>

<div class="cart-overlay" id="cartOverlay" onclick="handleOverlayClick(event)">
  <div class="cart-panel" id="cartPanel">
    <div id="cartContent">
      <div class="cart-header">
        <div class="cart-title">🛒 Savatcha</div>
        <button class="close-btn" onclick="closeCart()">✕</button>
      </div>
      <div class="address-section">
        <div class="address-label">Yetkazib berish manzili</div>
        <input class="address-input" id="address" type="text" placeholder="Ko'cha, uy raqami, kvartira...">
      </div>
      <div id="cartItems"></div>
      <div class="cart-footer" id="cartFooter"></div>
    </div>
    <div class="success-msg" id="successMsg">
      <div class="success-icon">✅</div>
      <div class="success-title">Buyurtma qabul qilindi!</div>
      <div class="success-sub">Tez orada yetkazib beramiz. O'rtacha vaqt: 35 daqiqa</div>
    </div>
  </div>
</div>

<script>
  const menu = [
    { id:1,  name:"Classic Burger",       price:35000, emoji:"🍔", cat:"burger" },
    { id:2,  name:"Double Cheese Burger", price:45000, emoji:"🍔", cat:"burger" },
    { id:3,  name:"BBQ Burger",           price:42000, emoji:"🍔", cat:"burger" },
    { id:4,  name:"Pepperoni Pizza",      price:65000, emoji:"🍕", cat:"pizza"  },
    { id:5,  name:"Margarita Pizza",      price:55000, emoji:"🍕", cat:"pizza"  },
    { id:6,  name:"4 Qo'shimcha Pizza",   price:72000, emoji:"🍕", cat:"pizza"  },
    { id:7,  name:"Qovurilgan Tovuq",     price:38000, emoji:"🍗", cat:"chicken"},
    { id:8,  name:"Crispy Sandwich",      price:32000, emoji:"🥪", cat:"chicken"},
    { id:9,  name:"Chicken Wings x6",     price:28000, emoji:"🍗", cat:"chicken"},
    { id:10, name:"Katta Kartoshka",      price:18000, emoji:"🍟", cat:"sides"  },
    { id:11, name:"Nuggets x8",           price:22000, emoji:"🧆", cat:"sides"  },
    { id:12, name:"Ko'k Salat",           price:20000, emoji:"🥗", cat:"sides"  },
    { id:13, name:"Kola 0.5L",            price:8000,  emoji:"🥤", cat:"drinks" },
    { id:14, name:"Apelsin Sharbat",      price:10000, emoji:"🍊", cat:"drinks" },
    { id:15, name:"Mineral Suv",          price:6000,  emoji:"💧", cat:"drinks" },
    { id:16, name:"Pepsi Cola 0.5L",      price:9000,  emoji:"🧃", cat:"drinks" },
  ];

  let cart = [];
  let currentCat = 'all';

  function formatPrice(p) {
    return p.toLocaleString('uz-UZ') + " so'm";
  }

  function renderMenu(cat) {
    const grid = document.getElementById('menuGrid');
    const items = cat === 'all' ? menu : menu.filter(m => m.cat === cat);
    grid.innerHTML = items.map(item => {
      const inCart = cart.find(c => c.id === item.id);
      return `<div class="menu-card">
        <div class="menu-img">${item.emoji}</div>
        <div class="menu-info">
          <div class="menu-name">${item.name}</div>
          <div class="menu-price">${formatPrice(item.price)}</div>
          <button class="add-btn ${inCart ? 'added' : ''}" onclick="addToCart(${item.id})" id="btn-${item.id}">
            ${inCart ? "✓ Qo'shildi" : '+ Savatga'}
          </button>
        </div>
      </div>`;
    }).join('');
  }

  function filterCat(cat, btn) {
    currentCat = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderMenu(cat);
  }

  function addToCart(id) {
    const item = menu.find(m => m.id === id);
    const existing = cart.find(c => c.id === id);
    if (existing) {
      existing.qty += 1;
    } else {
      cart.push({ ...item, qty: 1 });
    }
    updateCartCount();
    const btn = document.getElementById('btn-' + id);
    if (btn) {
      btn.textContent = "✓ Qo'shildi";
      btn.classList.add('added');
    }
  }

  function updateCartCount() {
    const total = cart.reduce((s, c) => s + c.qty, 0);
    document.getElementById('cartCount').textContent = total;
  }

  function openCart() {
    document.getElementById('cartOverlay').classList.add('open');
    renderCart();
  }

  function closeCart() {
    document.getElementById('cartOverlay').classList.remove('open');
    document.getElementById('successMsg').classList.remove('show');
    document.getElementById('cartContent').style.display = '';
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('cartOverlay')) closeCart();
  }

  function renderCart() {
    const container = document.getElementById('cartItems');
    const footer = document.getElementById('cartFooter');
    if (cart.length === 0) {
      container.innerHTML = "<div class='empty-cart'>Savatcha bo'sh 🛒<br>Taomlar qo'shing!</div>";
      footer.innerHTML = '';
      return;
    }
    container.innerHTML = cart.map(item => `
      <div class="cart-item">
        <div class="cart-item-emoji">${item.emoji}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">${formatPrice(item.price)}</div>
        </div>
        <div class="qty-controls">
          <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
          <div class="qty-num">${item.qty}</div>
          <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
        </div>
      </div>
    `).join('');

    const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
    footer.innerHTML = `
      <div class="total-row">
        <span>Jami:</span>
        <span>${formatPrice(total)}</span>
      </div>
      <button class="order-btn" onclick="placeOrder()">Buyurtma berish →</button>
    `;
  }

  function changeQty(id, delta) {
    const idx = cart.findIndex(c => c.id === id);
    if (idx === -1) return;
    cart[idx].qty += delta;
    if (cart[idx].qty <= 0) cart.splice(idx, 1);
    updateCartCount();
    renderCart();
    renderMenu(currentCat);
  }

  function placeOrder() {
    const addr = document.getElementById('address').value.trim();
    if (!addr) {
      document.getElementById('address').focus();
      document.getElementById('address').style.borderColor = '#e8340a';
      return;
    }
    document.getElementById('cartContent').style.display = 'none';
    document.getElementById('successMsg').classList.add('show');
    cart = [];
    updateCartCount();
    renderMenu(currentCat);
  }

  renderMenu('all');
</script>
</body>
</html>
